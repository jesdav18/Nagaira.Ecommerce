<section class="featured-section">
  <div class="container">
    <div class="section-header">
      <div>
        <h2 class="section-title">Llevá más, pagá menos</h2>
        <p class="section-copy">Productos seleccionados con precio especial al llevar 3+ unidades.</p>
      </div>
      <a routerLink="/products" class="view-all">
        Ver todos
      </a>
    </div>

    @if (loading()) {
      <div class="loading-grid">
        @for (i of [1,2,3,4,5,6,7,8]; track i) {
          <div class="skeleton-card"></div>
        }
      </div>
    } @else {
      <div class="products-grid">
        @for (product of featuredProducts(); track product.id) {
          <app-product-card [product]="product" layout="wide" />
        }
      </div>
    }
  </div>
</section>
